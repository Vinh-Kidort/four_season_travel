# --- CẤU HÌNH HỆ THỐNG CƠ BẢN (KHÔNG BẢO MẬT) ---

# Gọi file secret vào dự án (Chữ optional giúp Java không báo lỗi nếu file này bị thiếu)
spring.config.import=optional:application-secret.properties

# Cổng chạy Server
server.port=8080

# Cấu hình Database (Nếu chạy Local không có mật khẩu thì để ở đây, nếu có mật khẩu thì chuyển sang file Secret)
spring.data.mongodb.uri=mongodb://localhost:27017/four_season_travel

# Các cấu hình hệ thống khác không chứa mật khẩu
spring.cache.caffeine.spec=
bank.qr.template=
recaptcha.min-score=0.5
recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify

# (ĐÃ XÓA TOÀN BỘ CÁC DÒNG CLOUDINARY, MAIL, MEILISEARCH BỊ RỖNG Ở ĐÂY)